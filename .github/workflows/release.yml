name: Release

# Tag-driven release. Push a tag like `v0.1.0-beta.1` and this builds the
# NSIS installer and attaches it to a GitHub Release (marked pre-release).
#
# Runs on a SELF-HOSTED Windows runner — your machine — because the shipped
# artifact needs the custom from-source b9616 CUDA build (`npm run
# rebuild:llama`), which requires the CUDA Toolkit + VS Build Tools, and
# because we verify on a real GPU (`npm run smoke`) before publishing.
# Register the runner under repo Settings → Actions → Runners; it needs the
# labels [self-hosted, windows] (default) plus the CUDA/VS toolchain installed.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release + upload the installer

jobs:
  release:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      # Compile the custom b9616 CUDA backend (gemma4 + newer archs). This is
      # the slow step (~tens of minutes from clean, since npm ci wipes the
      # previous localBuilds). It no-ops if a valid build is already present.
      - name: Build custom llama.cpp CUDA backend
        run: npm run rebuild:llama

      - name: Typecheck & unit tests
        run: npm run typecheck && npm test

      # Real GPU verification on this machine before we ship the binary:
      # downloads a tiny model from HF, loads it on the GPU, streams a reply.
      - name: GPU smoke
        run: npm run smoke

      - name: Build installer
        run: npm run dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: release/**/*-setup.exe
